<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_title }} - 비밀번호 변경</title>
    <link rel="stylesheet" href="/static/css/app.css" />
    <style>
        .page-wrap {
            padding: 18px;
        }

        .card-box {
            max-width: 720px;
            margin: 18px auto 0;
            background: #fff;
            border: 1px solid #dfe6ef;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 13px;
            color: #475569;
            font-weight: 600;
        }

        .field input {
            height: 42px;
            border: 1px solid #cfd8e3;
            border-radius: 10px;
            padding: 0 12px;
            font-size: 14px;
            outline: none;
        }

        .helper {
            margin-top: 10px;
            font-size: 12px;
            color: #64748b;
        }

        .message-box {
            min-height: 22px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 600;
        }

        .message-box.ok {
            color: #166534;
        }

        .message-box.error {
            color: #b91c1c;
        }

        .top-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="app-shell page-wrap">
        <div class="topbar">
            <div class="title-wrap">
                <h2>{{ app_title }} - 비밀번호 변경</h2>
                <div class="meta">
                    사용자: <strong>{{ current_user.name }} ({{ current_user.id }})</strong>
                    &nbsp;|&nbsp; 버전: <strong>{{ app_version }}</strong>
                    &nbsp;|&nbsp; 수정일: <strong>{{ app_last_modified }}</strong>
                </div>
            </div>
            <div class="top-actions">
                <a class="btn btn-stage" href="/dashboard">대시보드로</a>
                <form method="post" action="/logout" style="margin:0;">
                    <button class="btn btn-primary" type="submit">로그아웃</button>
                </form>
            </div>
        </div>

        <div class="card-box">
            <div id="messageBox" class="message-box"></div>

            <form id="passwordForm" class="form-grid">
                <div class="field">
                    <label for="currentPassword">현재 비밀번호</label>
                    <input id="currentPassword" type="password" autocomplete="current-password" />
                </div>

                <div class="field">
                    <label for="newPassword">새 비밀번호</label>
                    <input id="newPassword" type="password" autocomplete="new-password" />
                </div>

                <div class="field">
                    <label for="newPasswordConfirm">새 비밀번호 확인</label>
                    <input id="newPasswordConfirm" type="password" autocomplete="new-password" />
                </div>

                <div class="helper">
                    지금은 내부 운영 단계라 복잡도 규칙은 강하게 두지 않았어. 대신 현재와 다른 새 비밀번호를 입력해.
                </div>

                <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
                    <button class="btn btn-primary" type="submit">비밀번호 변경</button>
                    <button class="btn btn-secondary" type="button" id="resetBtn">초기화</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function setMessage(text, isError = false) {
            const box = document.getElementById("messageBox");
            box.textContent = text || "";
            box.className = "message-box " + (text ? (isError ? "error" : "ok") : "");
        }

        function resetForm() {
            document.getElementById("currentPassword").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("newPasswordConfirm").value = "";
            setMessage("");
        }

        async function submitChangePassword(event) {
            event.preventDefault();
            setMessage("");

            const currentPassword = document.getElementById("currentPassword").value.trim();
            const newPassword = document.getElementById("newPassword").value.trim();
            const newPasswordConfirm = document.getElementById("newPasswordConfirm").value.trim();

            if (!currentPassword) {
                setMessage("현재 비밀번호를 입력해.", true);
                return;
            }
            if (!newPassword) {
                setMessage("새 비밀번호를 입력해.", true);
                return;
            }
            if (newPassword !== newPasswordConfirm) {
                setMessage("새 비밀번호 확인이 일치하지 않아.", true);
                return;
            }

            const formData = new FormData();
            formData.append("current_password", currentPassword);
            formData.append("new_password", newPassword);
            formData.append("new_password_confirm", newPasswordConfirm);

            const res = await fetch("/api/account/change-password", {
                method: "POST",
                body: formData,
                credentials: "same-origin",
            });

            const data = await res.json();
            if (!res.ok || !data.ok) {
                setMessage(data.detail || data.message || "비밀번호 변경에 실패했습니다.", true);
                return;
            }

            setMessage(data.message || "비밀번호를 변경했습니다.");
            resetForm();
        }

        document.getElementById("passwordForm").addEventListener("submit", submitChangePassword);
        document.getElementById("resetBtn").addEventListener("click", resetForm);
    </script>
</body>

</html>
