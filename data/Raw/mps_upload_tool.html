<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MPS Records 업로드 도구</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; max-width: 700px; margin: 60px auto; padding: 20px; background: #f5f7fa; color: #333; }
  h2 { color: #4f46e5; }
  .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .btn { background: #4f46e5; color: white; border: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 16px; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn-danger { background: #ef4444; }
  input[type=file] { display: block; margin: 16px 0; padding: 10px; border: 2px dashed #4f46e5; border-radius: 8px; width: 100%; box-sizing: border-box; cursor: pointer; }
  .log { background: #1e1e2e; color: #a6e3a1; font-family: monospace; padding: 16px; border-radius: 8px; margin-top: 20px; min-height: 120px; max-height: 300px; overflow-y: auto; font-size: 13px; white-space: pre-wrap; }
  .warn { background: #fff7ed; border: 1px solid #fb923c; border-radius: 8px; padding: 14px; margin-bottom: 20px; color: #c2410c; font-size: 14px; }
  .step { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 14px; }
  .badge { background: #e0e7ff; color: #4f46e5; border-radius: 99px; padding: 2px 10px; font-size: 12px; font-weight: bold; }
  .progress-bar { background: #e5e7eb; border-radius: 99px; height: 10px; margin-top: 12px; overflow: hidden; }
  .progress-fill { background: #4f46e5; height: 100%; width: 0%; transition: width 0.3s; border-radius: 99px; }
</style>
</head>
<body>
<div class="card">
  <h2>📤 MPS Records 업로드 도구</h2>
  <p style="color:#666; font-size:14px;">엑셀(.xlsm/.xlsx) 파일을 선택하면 Supabase <b>mps_records</b> 테이블에 업로드합니다.</p>

  <div class="warn">
    ⚠️ <b>주의:</b> 기존 mps_records 데이터가 <b>전체 삭제</b>된 후 새 데이터로 교체됩니다.
  </div>

  <div class="step"><span class="badge">1</span> 엑셀 파일 선택 (.xlsm 또는 .xlsx)</div>
  <input type="file" id="fileInput" accept=".xlsx,.xlsm">

  <div id="fileInfo" style="font-size:13px; color:#555; margin-top:4px;"></div>

  <button class="btn btn-danger" id="uploadBtn" disabled onclick="startUpload()">🗑️ 기존 데이터 삭제 후 업로드</button>

  <div class="progress-bar" style="display:none" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="log" id="log">대기 중...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL = 'https://zuaepuccfxvqanznaewn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rdxm5yH7HsaVfiJDr9-BRw_2SE_5-Q8';
const TABLE = 'mps_records';
const BATCH_SIZE = 50;

let parsedData = [];

function log(msg, color) {
  const el = document.getElementById('log');
  const line = color ? `<span style="color:${color}">${msg}</span>\n` : msg + '\n';
  el.innerHTML += line;
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('fileInfo').textContent = `선택된 파일: ${file.name}`;
  document.getElementById('log').innerHTML = '';
  log(`📂 파일 읽는 중: ${file.name}`);

  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const wb = XLSX.read(evt.target.result, { type: 'binary', cellDates: true });
      const ws = wb.Sheets['MPS'] || wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { defval: null });

      const allRows = raw.map(row => {
        const obj = {};
        for (const key in row) {
          const val = row[key];
          if (val instanceof Date) {
            // ★ 타임존 오프셋 보정 (-1일 버그 수정)
          const offset = val.getTimezoneOffset() * 60000;
          const local = new Date(val.getTime() - offset);
          obj[key] = local.toISOString().split('T')[0];
          } else if (val === '' || val === undefined) {
            obj[key] = null;
          } else {
            obj[key] = val;
          }
        }
        return obj;
      });

      // lot 빈값 → 바로 위 행의 lot 값으로 채우기 (ffill)
      let lastLot = null;
      let lotFillCount = 0;
      for (const row of allRows) {
        if (row.lot !== null && row.lot !== undefined && row.lot !== '') {
          lastLot = row.lot;
        } else if (lastLot !== null) {
          row.lot = lastLot;
          lotFillCount++;
        }
      }

      // wo가 null인 행 제외
      const skipped = allRows.filter(r => !r.wo);
      parsedData = allRows.filter(r => r.wo);

      log(`✅ 파싱 완료: 전체 ${allRows.length}행 → 업로드 ${parsedData.length}행`, '#a6e3a1');
      if (lotFillCount > 0) {
        log(`🔄 lot 빈값 ${lotFillCount}개 → 위 행 값으로 자동 채움`, '#89dceb');
      }
      if (skipped.length > 0) {
        log(`⚠️  wo 없는 행 ${skipped.length}개 제외됨`, '#fab387');
      }
      log(`📋 컬럼: ${Object.keys(parsedData[0]).join(', ')}`, '#89dceb');
      document.getElementById('uploadBtn').disabled = false;
    } catch(err) {
      log(`❌ 파일 읽기 오류: ${err.message}`, '#f38ba8');
    }
  };
  reader.readAsBinaryString(file);
});

async function startUpload() {
  if (!parsedData.length) return;

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true;
  document.getElementById('progressBar').style.display = 'block';
  setProgress(0);

  log('\n🗑️  기존 데이터 삭제 중...', '#fab387');

  // Step 1: 기존 데이터 전체 삭제
  try {
    const delRes = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=gte.0`, {
      method: 'DELETE',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      }
    });

    // id 컬럼이 없을 경우 대비해서 neq 방식도 시도
    if (!delRes.ok && delRes.status !== 404) {
      // lot 컬럼으로 삭제 시도
      const delRes2 = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?lot=gte.0`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        }
      });
      if (!delRes2.ok) {
        const errText = await delRes2.text();
        throw new Error(`삭제 실패: ${errText}`);
      }
    }
    log('✅ 기존 데이터 삭제 완료', '#a6e3a1');
  } catch(err) {
    log(`❌ 삭제 오류: ${err.message}`, '#f38ba8');
    btn.disabled = false;
    return;
  }

  // Step 2: 배치로 나눠서 INSERT
  const total = parsedData.length;
  let inserted = 0;

  log(`\n📤 업로드 시작 (총 ${total}행, ${BATCH_SIZE}행씩 배치)`, '#89dceb');

  for (let i = 0; i < total; i += BATCH_SIZE) {
    const batch = parsedData.slice(i, i + BATCH_SIZE);

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(batch)
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(errText);
      }

      inserted += batch.length;
      const pct = Math.round((inserted / total) * 100);
      setProgress(pct);
      log(`  ✔ ${inserted}/${total}행 업로드 완료 (${pct}%)`, '#a6e3a1');

    } catch(err) {
      log(`❌ 배치 오류 (${i}~${i+BATCH_SIZE}): ${err.message}`, '#f38ba8');
      btn.disabled = false;
      return;
    }
  }

  setProgress(100);
  log(`\n🎉 전체 업로드 완료! ${inserted}행이 mps_records에 저장되었습니다.`, '#a6e3a1');
  btn.disabled = false;
}
</script>
</body>
</html>
